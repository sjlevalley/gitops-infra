---
- name: Check if metrics-server is already installed
  command: kubectl get deployment metrics-server -n kube-system
  register: metrics_server_check
  failed_when: false
  changed_when: false
  become: false
  environment:
    KUBECONFIG: /home/admin/.kube/config

- name: Install metrics-server
  command: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  become: false
  environment:
    KUBECONFIG: /home/admin/.kube/config
  when: metrics_server_check.rc != 0

- name: Patch metrics-server to allow insecure kubelet TLS
  command: >
    kubectl patch deployment metrics-server -n kube-system --type=json
    -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
  become: false
  environment:
    KUBECONFIG: /home/admin/.kube/config
  when: metrics_server_check.rc != 0

- name: Wait for metrics-server to be ready
  command: kubectl rollout status deployment/metrics-server -n kube-system --timeout=90s
  become: false
  environment:
    KUBECONFIG: /home/admin/.kube/config
